<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人主页</title>
    <style>
        /* 这是CSS，负责好看 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f6f8fa;
            font-family: "Microsoft YaHei", sans-serif;
            padding: 30px;
        }

        .box {
            background: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .name {
            font-size: 32px;
            color: #2c3e50;
            margin: 20px 0;
        }

        .info {
            font-size: 18px;
            color: #555;
            line-height: 1.6;
            margin: 10px 0;
        }

        .hobby {
            text-align: left;
            margin: 20px auto;
            max-width: 300px;
        }

        .hobby h3 {
            color: #3498db;
            margin-bottom: 10px;
        }

        .hobby li {
            list-style: none;
            background: #e7f5ff;
            margin: 5px 0;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .slogan {
            margin-top: 25px;
            font-size: 16px;
            color: #7f8c8d;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1 class="name">我的个人主页</h1>

        <p class="info">大家好，我是一名喜欢编程的小学生！</p>
        <p class="info">我会做网页、画画、看书、运动。</p>

        <div class="hobby">
            <h3>我的爱好 🎨</h3>
            <li>编程做网页</li>
            <li>画画</li>
            <li>看书</li>
            <li>运动</li>
            <li>玩益智游戏</li>
        </div>

        <p class="slogan">每天进步一点点，就是最棒的自己！</p>
    </div>
</body>
</html>
